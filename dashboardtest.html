<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPD Dashboard - Panel Anggota</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; --text: #ffffff; --success: #2ecc71; --accent: #0f3460; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .container { background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 450px; border-top: 5px solid var(--primary); }
        
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }
        .nav-btn { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.8em; font-weight: bold; text-decoration: none; text-align: center; color: white; transition: 0.3s; min-width: 80px; }
        .btn-logout { background: #444; }
        .btn-gaji { background: #27ae60; }
        .btn-admin { background: #f39c12; display: none; border: 2px solid rgba(255,255,255,0.1); }

        h2 { text-align: center; margin: 10px 0 5px 0; text-transform: uppercase; }
        h4 { text-align: center; color: #888; font-weight: normal; margin-bottom: 25px; border-bottom: 1px solid #30475e; padding-bottom: 15px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85em; color: #aaa; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30475e; background: #1a1a2e; color: white; box-sizing: border-box; font-family: inherit; }
        
        button#btn-submit { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px; }
        button#btn-submit:disabled { background: #555; cursor: not-allowed; }

        /* Modal Gaji */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 10% auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid var(--primary); }
        .gaji-item { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #30475e; }
        .total-gaji { font-size: 1.5em; color: var(--success); text-align: center; margin-top: 20px; font-weight: bold; }
        .close-modal { background: var(--primary); color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; margin-top: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <a href="#" class="nav-btn btn-logout" onclick="logout()">Logout</a>
        <button class="nav-btn btn-gaji" onclick="showGaji()">Cek Gaji</button>
        <a href="rekap.html" id="admin-link" class="nav-btn btn-admin">Rekap</a>
    </div>

    <div id="dashboard-content">
        <h2 id="name-display">Memuat...</h2>
        <h4 id="rank-display">Pangkat | Divisi</h4>

        <form id="absensi-form">
            <div class="form-group">
                <label>Status Kehadiran</label>
                <select id="status_absen" onchange="toggleFormMode()" required>
                    <option value="HADIR">HADIR (ON DUTY)</option>
                    <option value="IZIN">IZIN (HALANGAN)</option>
                    <option value="CUTI">CUTI (RENTANG WAKTU)</option>
                </select>
            </div>

            <div class="form-group" id="single-date-section">
                <label id="label-tanggal">Tanggal</label>
                <input type="date" id="tanggal_absen">
            </div>

            <div class="form-group" id="range-date-section" style="display:none;">
                <label>Periode Cuti</label>
                <div style="display:flex; gap:10px;">
                    <input type="date" id="cuti_mulai">
                    <input type="date" id="cuti_selesai">
                </div>
            </div>

            <div id="hadir-section">
                <div class="form-group">
                    <label>Waktu Duty</label>
                    <div style="display:flex; gap:10px; align-items:center;">
                        <input type="time" id="jam_mulai">
                        <span>s/d</span>
                        <input type="time" id="jam_selesai">
                    </div>
                </div>
                <div class="form-group">
                    <label>Bukti Foto</label>
                    <input type="file" id="bukti_foto" accept="image/*">
                </div>
            </div>

            <div class="form-group">
                <label>Kegiatan / Alasan</label>
                <textarea id="kegiatan" rows="3" required></textarea>
            </div>

            <button type="submit" id="btn-submit">Kirim Laporan</button>
        </form>
        <div id="status-msg"></div>
    </div>
</div>

<div id="gajiModal" class="modal">
    <div class="modal-content">
        <h3 style="text-align:center; margin-top:0;">💰 Estimasi Gaji Minggu Ini</h3>
        <p style="font-size: 0.8em; color: #888; text-align: center;">(Berdasarkan Absen HADIR Terverifikasi)</p>
        
        <div class="gaji-item"><span>Total Hadir:</span> <span id="val-hadir">0</span></div>
        <div class="gaji-item"><span>Gaji Pokok (@50k):</span> <span id="val-pokok">Rp 0</span></div>
        <div class="gaji-item"><span>Potongan (Target 6x):</span> <span id="val-potongan" style="color:#e94560;">- Rp 0</span></div>
        
        <div class="total-gaji" id="val-total">Rp 0</div>
        
        <button class="close-modal" onclick="document.getElementById('gajiModal').style.display='none'">Tutup</button>
    </div>
</div>

<script>
    const _supabase = window.supabase.createClient("https://urclmvdkfkfwvdascobs.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyY2xtdmRrZmtmd3ZkYXNjb2JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDkzMjQsImV4cCI6MjA5MTM4NTMyNH0.FE8ynCm5Pfg861wpG1rslSCLSNUnXSwyEIVbHiqajT4");

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const discordId = urlParams.get('id') || localStorage.getItem("discord_id");
        
        if (!discordId) { window.location.href = "index.html"; return; }
        
        if (urlParams.get('id')) {
            localStorage.setItem("discord_id", discordId);
            localStorage.setItem("nama_user", decodeURIComponent(urlParams.get('name')));
            localStorage.setItem("pangkat", decodeURIComponent(urlParams.get('pangkat') || "Unknown"));
            localStorage.setItem("divisi", decodeURIComponent(urlParams.get('divisi') || "-"));
            localStorage.setItem("is_admin", urlParams.get('admin') === 'true');
            window.history.replaceState({}, document.title, window.location.pathname);
        }
        updateUI();
        toggleFormMode();
    };

    function updateUI() {
        document.getElementById('name-display').innerText = localStorage.getItem("nama_user");
        document.getElementById('rank-display').innerText = `${localStorage.getItem("pangkat")} | ${localStorage.getItem("divisi")}`;
        if (localStorage.getItem("is_admin") === "true") document.getElementById('admin-link').style.display = 'block';
    }

    // FITUR CEK GAJI
    async function showGaji() {
        const modal = document.getElementById('gajiModal');
        const discordId = localStorage.getItem("discord_id");
        modal.style.display = 'block';
        document.getElementById('val-total').innerText = "Menghitung...";

        // Ambil data absen hadir 7 hari terakhir
        const { data, error } = await _supabase
            .from('absensi_sapd')
            .select('*')
            .eq('discord_id', discordId)
            .ilike('jam_duty', '%-%'); // Hanya yang ada jam (Hadir)

        if (error) return alert("Gagal mengambil data gaji");

        const totalHadir = data.length;
        const upahPerHadir = 50000; // Rp 50.000 (Sesuaikan sendiri)
        const targetHadir = 6;
        
        let gajiKotor = totalHadir * upahPerHadir;
        let potongan = 0;

        // Logika Potongan jika di bawah target 6
        if (totalHadir < targetHadir && totalHadir > 0) {
            potongan = (targetHadir - totalHadir) * 10000; // Potong 10rb per kekurangan
        }

        const totalGaji = gajiKotor - potongan;

        document.getElementById('val-hadir').innerText = totalHadir + "x";
        document.getElementById('val-pokok').innerText = "Rp " + gajiKotor.toLocaleString();
        document.getElementById('val-potongan').innerText = "- Rp " + potongan.toLocaleString();
        document.getElementById('val-total').innerText = "Rp " + (totalGaji < 0 ? 0 : totalGaji).toLocaleString();
    }

    function toggleFormMode() {
        const status = document.getElementById('status_absen').value;
        const today = new Date().toLocaleDateString('en-CA');
        const tglInput = document.getElementById('tanggal_absen');
        const cutiMulai = document.getElementById('cuti_mulai');
        const cutiSelesai = document.getElementById('cuti_selesai');

        tglInput.value = ""; cutiMulai.value = ""; cutiSelesai.value = "";
        tglInput.removeAttribute('min'); tglInput.removeAttribute('max');
        cutiMulai.removeAttribute('min'); cutiSelesai.removeAttribute('min');

        if (status === "HADIR") {
            document.getElementById('hadir-section').style.display = "block";
            document.getElementById('single-date-section').style.display = "block";
            document.getElementById('range-date-section').style.display = "none";
            tglInput.max = today;
            tglInput.required = true;
        } else if (status === "IZIN") {
            document.getElementById('hadir-section').style.display = "none";
            document.getElementById('single-date-section').style.display = "block";
            document.getElementById('range-date-section').style.display = "none";
            tglInput.min = today;
            tglInput.required = true;
        } else {
            document.getElementById('hadir-section').style.display = "none";
            document.getElementById('single-date-section').style.display = "none";
            document.getElementById('range-date-section').style.display = "block";
            cutiMulai.min = today; cutiSelesai.min = today;
            tglInput.required = false;
        }
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }

    document.getElementById('absensi-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        const msg = document.getElementById('status-msg');
        btn.disabled = true;
        btn.innerText = "Memproses...";

        try {
            // Logika upload & fetch Netlify sama seperti sebelumnya...
            // (Disederhanakan agar tidak terlalu panjang, gunakan logic submit-absensi.js kamu)
            alert("Laporan Terkirim (Gunakan logika fetch Netlify Anda di sini)");
            msg.innerText = "✔ Berhasil!";
        } catch (err) {
            msg.innerText = "❌ Error: " + err.message;
        } finally {
            btn.disabled = false;
            btn.innerText = "Kirim Laporan";
        }
    });
</script>
</body>
</html>
