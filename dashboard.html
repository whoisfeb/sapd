<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPD Dashboard - Panel Anggota</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; --text: #ffffff; --success: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        
        .container { background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 450px; border-top: 5px solid var(--primary); }
        
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; flex-wrap: wrap; }
        .nav-btn { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.8em; font-weight: bold; text-decoration: none; text-align: center; color: white; transition: 0.3s; min-width: 80px; }
        .btn-logout { background: #444; }
        .btn-gaji { background: #27ae60; }
        .btn-admin { background: #f39c12; display: none; border: 2px solid rgba(255,255,255,0.1); }

        h2 { text-align: center; margin: 10px 0 5px 0; text-transform: uppercase; }
        h4 { text-align: center; color: #888; font-weight: normal; margin-bottom: 25px; border-bottom: 1px solid #30475e; padding-bottom: 15px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85em; color: #aaa; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30475e; background: #1a1a2e; color: white; box-sizing: border-box; font-family: inherit; }
        
        .date-row, .time-row { display: flex; gap: 10px; }
        .date-row div, .time-row div { flex: 1; }

        button#btn-submit { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px; }
        button#btn-submit:disabled { background: #555; cursor: not-allowed; }
        
        #status-msg { text-align: center; margin-top: 15px; font-size: 0.9em; font-weight: bold; min-height: 1.5em; }

        /* Modal Gaji & Stat */
        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); }
        .modal-content { background: var(--card); margin: 5% auto; padding: 25px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid var(--primary); }
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: var(--bg); padding: 10px; border-radius: 8px; text-align: center; border: 1px solid #30475e; }
        .stat-box small { display: block; color: #888; font-size: 0.7em; text-transform: uppercase; margin-bottom: 5px; }
        .stat-box span { font-weight: bold; font-size: 1.2em; color: var(--success); }
        .gaji-item { display: flex; justify-content: space-between; margin-bottom: 8px; padding-bottom: 5px; border-bottom: 1px solid #30475e; font-size: 0.9em; }
        .total-gaji { font-size: 1.5em; color: var(--success); text-align: center; margin-top: 15px; font-weight: bold; border-top: 2px dashed #30475e; padding-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <a href="#" class="nav-btn btn-logout" onclick="logout()">Logout</a>
        <button class="nav-btn btn-gaji" onclick="showGaji()">Cek Gaji & Stat</button>
        <a href="rekap.html" id="admin-link" class="nav-btn btn-admin">Panel Rekap</a>
    </div>

    <div id="dashboard-content">
        <h2 id="name-display">Memuat...</h2>
        <h4 id="rank-display">Pangkat | Divisi</h4>

        <form id="absensi-form">
            <div class="form-group">
                <label>Status Kehadiran</label>
                <select id="status_absen" onchange="toggleFormMode()" required>
                    <option value="HADIR">HADIR (ON DUTY)</option>
                    <option value="IZIN">IZIN (HALANGAN)</option>
                    <option value="CUTI">CUTI (RENTANG WAKTU)</option>
                </select>
            </div>

            <div class="form-group" id="single-date-section">
                <label id="label-tanggal">Tanggal</label>
                <input type="date" id="tanggal_absen">
            </div>

            <div class="form-group" id="range-date-section" style="display:none;">
                <label>Periode Cuti (Mulai - Berakhir)</label>
                <div class="date-row">
                    <div><input type="date" id="cuti_mulai"></div>
                    <div><input type="date" id="cuti_selesai"></div>
                </div>
            </div>

            <div id="hadir-section">
                <div class="form-group">
                    <label>Waktu Duty (Mulai - Selesai)</label>
                    <div class="time-row">
                        <div><input type="time" id="jam_mulai"></div>
                        <div style="display:flex; align-items:center; color:#aaa;">s/d</div>
                        <div><input type="time" id="jam_selesai"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Bukti Foto (SS SAMP)</label>
                    <input type="file" id="bukti_foto" accept="image/*">
                </div>
            </div>

            <div class="form-group">
                <label id="label-kegiatan">Kegiatan / Alasan</label>
                <textarea id="kegiatan" rows="3" placeholder="Deskripsi..." required></textarea>
            </div>

            <button type="submit" id="btn-submit">Kirim Laporan</button>
        </form>
        <div id="status-msg"></div>
    </div>
</div>

<div id="gajiModal" class="modal">
    <div class="modal-content">
        <h3 style="text-align:center; margin-top:0;">📊 Gaji & Statistik</h3>
        
        <div class="stat-grid">
            <div class="stat-box"><small>Hadir</small><span id="stat-hadir">0</span></div>
            <div class="stat-box"><small>Izin</small><span id="stat-izin">0</span></div>
            <div class="stat-box"><small>Cuti</small><span id="stat-cuti">0</span></div>
            <div class="stat-box"><small>Alpa</small><span id="stat-alpa" style="color:#e94560;">0</span></div>
        </div>

        <div class="gaji-item"><span>Gaji Pokok (Rank):</span> <span id="val-pokok">Rp 0</span></div>
        <div class="gaji-item"><span>Potongan Alpa:</span> <span id="val-potongan" style="color:#e94560;">- Rp 0</span></div>
        
        <div class="total-gaji" id="val-total">Rp 0</div>
        
        <button onclick="document.getElementById('gajiModal').style.display='none'" style="width:100%; padding:10px; margin-top:20px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer;">Tutup</button>
    </div>
</div>

<script>
    const _supabase = window.supabase.createClient("https://urclmvdkfkfwvdascobs.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyY2xtdmRrZmtmd3ZkYXNjb2JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDkzMjQsImV4cCI6MjA5MTM4NTMyNH0.FE8ynCm5Pfg861wpG1rslSCLSNUnXSwyEIVbHiqajT4");

    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const discordId = urlParams.get('id') || localStorage.getItem("discord_id");
        
        if (!discordId) { window.location.href = "index.html"; return; }

        if (urlParams.get('id')) {
            localStorage.setItem("discord_id", discordId);
            localStorage.setItem("nama_user", decodeURIComponent(urlParams.get('name')));
            localStorage.setItem("pangkat", decodeURIComponent(urlParams.get('pangkat') || "Unknown"));
            localStorage.setItem("divisi", decodeURIComponent(urlParams.get('divisi') || "-"));
            localStorage.setItem("is_admin", urlParams.get('admin') === 'true');
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        updateUI();
        toggleFormMode();
    };

    function updateUI() {
        document.getElementById('name-display').innerText = localStorage.getItem("nama_user");
        document.getElementById('rank-display').innerText = `${localStorage.getItem("pangkat")} | ${localStorage.getItem("divisi")}`;
        if (localStorage.getItem("is_admin") === "true") document.getElementById('admin-link').style.display = 'block';
    }

    async function showGaji() {
        const modal = document.getElementById('gajiModal');
        const discordId = localStorage.getItem("discord_id");
        const rankAsli = localStorage.getItem("pangkat") || "Unknown";
        const rankCek = rankAsli.toUpperCase().trim(); 

        modal.style.display = 'block';
        document.getElementById('val-total').innerText = "Menghitung...";

        const daftarGaji = {
            "CHIEF OF POLICE": 1000000,
            "COMMANDER": 800000,
            "CAPTAIN": 600000,
            "LIEUTENANT": 500000,
            "SERGEANT": 400000,
            "OFFICER": 300000,
            "CADET": 150000,
            "UNKNOWN": 0
        };

        const gajiPokok = daftarGaji[rankCek] || 0;
        const targetWajibHadir = 6; 

        try {
            const { data, error } = await _supabase.from('absensi_sapd').select('*').eq('discord_id', discordId);
            if (error) throw error;

            let hadir = 0, izin = 0, cuti = 0;
            data.forEach(row => {
                if (row.jam_duty && row.jam_duty.includes("-")) hadir++;
                else if (row.jam_duty === "IZIN") izin++;
                else if (row.jam_duty === "CUTI") cuti++;
            });

            let alpa = targetWajibHadir - hadir;
            if (alpa < 0) alpa = 0;

            const potonganPerAlpa = (gajiPokok > 0) ? (gajiPokok / targetWajibHadir) * 0.5 : 0; 
            const totalPotongan = alpa * potonganPerAlpa;
            const gajiAkhir = gajiPokok - totalPotongan;

            document.getElementById('stat-hadir').innerText = hadir;
            document.getElementById('stat-izin').innerText = izin;
            document.getElementById('stat-cuti').innerText = cuti;
            document.getElementById('stat-alpa').innerText = alpa;
            document.getElementById('val-pokok').innerText = "Rp " + gajiPokok.toLocaleString('id-ID');
            document.getElementById('val-potongan').innerText = "- Rp " + Math.floor(totalPotongan).toLocaleString('id-ID');
            document.getElementById('val-total').innerText = "Rp " + (gajiAkhir < 0 ? 0 : Math.floor(gajiAkhir)).toLocaleString('id-ID');

        } catch (e) { alert("Gagal mengambil data"); }
    }

    function toggleFormMode() {
        const status = document.getElementById('status_absen').value;
        const today = new Date().toLocaleDateString('en-CA');
        const hadirSec = document.getElementById('hadir-section');
        const singleSec = document.getElementById('single-date-section');
        const rangeSec = document.getElementById('range-date-section');
        const tglInput = document.getElementById('tanggal_absen');

        if (status === "HADIR") {
            singleSec.style.display = "block"; rangeSec.style.display = "none"; hadirSec.style.display = "block";
            tglInput.max = today; tglInput.required = true;
        } else if (status === "IZIN") {
            singleSec.style.display = "block"; rangeSec.style.display = "none"; hadirSec.style.display = "none";
            tglInput.min = today; tglInput.required = true;
        } else {
            singleSec.style.display = "none"; rangeSec.style.display = "block"; hadirSec.style.display = "none";
        }
    }

    function logout() { localStorage.clear(); window.location.href = "index.html"; }

    document.getElementById('absensi-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        const msg = document.getElementById('status-msg');
        const statusAbsen = document.getElementById('status_absen').value;
        const discordId = localStorage.getItem("discord_id");
        
        btn.disabled = true;
        btn.innerText = "Memverifikasi...";

        try {
            let dateList = [];
            if (statusAbsen === "CUTI") {
                let dStart = new Date(document.getElementById('cuti_mulai').value);
                let dEnd = new Date(document.getElementById('cuti_selesai').value);
                if (dEnd < dStart) throw new Error("Tanggal selesai tidak valid.");
                for (let d = new Date(dStart); d <= dEnd; d.setDate(d.getDate() + 1)) {
                    if (d.getDay() !== 0) dateList.push(new Date(d));
                }
            } else {
                let tglVal = new Date(document.getElementById('tanggal_absen').value);
                if (tglVal.getDay() === 0) throw new Error("Hari Minggu libur!");
                dateList.push(tglVal);
            }

            let imgUrl = "N/A";
            const file = document.getElementById('bukti_foto').files[0];
            if (statusAbsen === "HADIR" && file) {
                const path = `absensi/${Date.now()}_${discordId}.png`;
                await _supabase.storage.from('bukti-absen').upload(path, file);
                imgUrl = _supabase.storage.from('bukti-absen').getPublicUrl(path).data.publicUrl;
            }

            const reports = dateList.map(d => ({
                discord_id: discordId,
                jam_duty: (statusAbsen === "HADIR") ? `${document.getElementById('jam_mulai').value} - ${document.getElementById('jam_selesai').value}` : statusAbsen,
                kegiatan: document.getElementById('kegiatan').value,
                bukti_foto: imgUrl,
                created_at: d.toISOString()
            }));

            const response = await fetch('/.netlify/functions/submit-absensi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(reports)
            });

            const result = await response.json();
            if (response.status !== 200) throw new Error(result.message);

            msg.innerText = "✔ Berhasil dikirim!";
            msg.style.color = "#2ecc71";
            document.getElementById('absensi-form').reset();
            toggleFormMode();
        } catch (err) {
            msg.innerText = "❌ " + err.message;
            msg.style.color = "#e94560";
        } finally {
            btn.disabled = false;
            btn.innerText = "Kirim Laporan";
        }
    });
</script>
</body>
</html>
