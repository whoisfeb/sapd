<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPD Dashboard - Panel Anggota</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 450px; border-top: 5px solid var(--primary); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85em; color: #aaa; }
        input, textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30475e; background: #1a1a2e; color: white; box-sizing: border-box; }
        .date-row { display: flex; gap: 10px; margin-top: 5px; }
        .date-row div { flex: 1; }
        button#btn-submit { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #status-msg { text-align: center; margin-top: 15px; font-size: 0.9em; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="dashboard-content">
        <h2 id="name-display" style="text-align:center;">Memuat...</h2>
        <h4 id="rank-display" style="text-align:center; color:#888;">Pangkat | Divisi</h4>

        <form id="absensi-form">
            <div class="form-group">
                <label>Status Kehadiran</label>
                <select id="status_absen" onchange="toggleFormMode()" required>
                    <option value="HADIR">HADIR (ON DUTY)</option>
                    <option value="IZIN">IZIN (HALANGAN)</option>
                    <option value="CUTI">CUTI (RENTANG WAKTU)</option>
                </select>
            </div>

            <div class="form-group" id="single-date-section">
                <label id="label-tanggal">Tanggal</label>
                <input type="date" id="tanggal_absen">
            </div>

            <div class="form-group" id="range-date-section" style="display:none;">
                <label>Periode Cuti (Mulai - Berakhir)</label>
                <div class="date-row">
                    <div><input type="date" id="cuti_mulai"></div>
                    <div><input type="date" id="cuti_selesai"></div>
                </div>
            </div>

            <div id="jam-section">
                <div class="form-group">
                    <label>Waktu Duty</label>
                    <div style="display:flex; gap:10px;">
                        <input type="time" id="jam_mulai">
                        <input type="time" id="jam_selesai">
                    </div>
                </div>
                <div class="form-group" id="foto-section">
                    <label>Bukti Foto (SS SAMP)</label>
                    <input type="file" id="bukti_foto" accept="image/*">
                </div>
            </div>

            <div class="form-group">
                <label id="label-kegiatan">Keterangan</label>
                <textarea id="kegiatan" rows="3" required></textarea>
            </div>

            <button type="submit" id="btn-submit">Kirim Laporan</button>
        </form>
        <div id="status-msg"></div>
    </div>
</div>

<script>
    const _supabase = window.supabase.createClient("URL_LU", "KEY_LU");
    const urlParams = new URLSearchParams(window.location.search);
    const discordId = urlParams.get('id');

    // Inisialisasi awal
    document.getElementById('name-display').innerText = decodeURIComponent(urlParams.get('name') || "Unknown");
    document.getElementById('rank-display').innerText = `${decodeURIComponent(urlParams.get('pangkat') || "Unknown")} | ${decodeURIComponent(urlParams.get('divisi') || "-")}`;
    toggleFormMode();

    function toggleFormMode() {
        const status = document.getElementById('status_absen').value;
        const today = new Date().toISOString().split('T')[0];
        
        // Elemen
        const singleDate = document.getElementById('single-date-section');
        const rangeDate = document.getElementById('range-date-section');
        const jamSection = document.getElementById('jam-section');
        const inputTgl = document.getElementById('tanggal_absen');
        const inputMulai = document.getElementById('cuti_mulai');
        const inputSelesai = document.getElementById('cuti_selesai');

        if (status === "CUTI") {
            singleDate.style.display = "none";
            rangeDate.style.display = "block";
            jamSection.style.display = "none";
            inputTgl.required = false;
            inputMulai.required = true; inputSelesai.required = true;
            inputMulai.min = today; inputSelesai.min = today;
        } else {
            singleDate.style.display = "block";
            rangeDate.style.display = "none";
            inputTgl.required = true;
            inputMulai.required = false; inputSelesai.required = false;
            
            if (status === "HADIR") {
                inputTgl.max = today; inputTgl.removeAttribute('min');
                jamSection.style.display = "block";
            } else {
                inputTgl.min = today; inputTgl.removeAttribute('max');
                jamSection.style.display = "none";
            }
        }
    }

    document.getElementById('absensi-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const statusMsg = document.getElementById('status-msg');
        const statusAbsen = document.getElementById('status_absen').value;
        
        let dateList = [];
        
        // Logika Pengumpulan Tanggal
        if (statusAbsen === "CUTI") {
            let start = new Date(document.getElementById('cuti_mulai').value);
            let end = new Date(document.getElementById('cuti_selesai').value);
            
            for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                if (d.getDay() !== 0) { // 0 adalah Minggu/Sunday. Filter di sini.
                    dateList.push(new Date(d));
                }
            }
        } else {
            let tgl = new Date(document.getElementById('tanggal_absen').value);
            if (tgl.getDay() === 0) {
                alert("Hari Minggu libur, tidak perlu absen!");
                return;
            }
            dateList.push(tgl);
        }

        if (dateList.length === 0) {
            alert("Tidak ada tanggal valid (Hari Minggu dilewati).");
            return;
        }

        // Proses Kirim Massal
        try {
            document.getElementById('btn-submit').disabled = true;
            statusMsg.innerText = "Mengirim...";

            const payload = dateList.map(date => ({
                discord_id: discordId,
                nama_anggota: document.getElementById('name-display').innerText,
                pangkat: urlParams.get('pangkat') || "Unknown",
                jam_duty: (statusAbsen === "HADIR") ? `${document.getElementById('jam_mulai').value} - ${document.getElementById('jam_selesai').value}` : statusAbsen,
                kegiatan: document.getElementById('kegiatan').value,
                bukti_foto: "N/A", // Tambahkan logika upload jika HADIR
                created_at: date.toISOString()
            }));

            const { error } = await _supabase.from('absensi_sapd').insert(payload);
            if (error) throw error;

            statusMsg.innerText = "✔ Berhasil! Hari Minggu otomatis dilewati.";
            document.getElementById('absensi-form').reset();
            toggleFormMode();
        } catch (err) {
            statusMsg.innerText = "Error: " + err.message;
        } finally {
            document.getElementById('btn-submit').disabled = false;
        }
    });
</script>
</body>
</html>
