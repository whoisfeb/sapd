<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SAPD Admin - Rekap Detail</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; }
        body { font-family: sans-serif; background: var(--bg); color: white; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; margin-bottom: 20px; border-top: 4px solid var(--primary); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; min-width: 800px; }
        th, td { border: 1px solid #30475e; padding: 12px; text-align: left; }
        th { background: #0f3460; }
        .tab-btn { background: none; border: none; color: gray; cursor: pointer; font-size: 1.1em; margin-right: 20px; padding-bottom: 5px; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); }
        .btn-reset { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        .img-link { color: #00d2ff; text-decoration: none; font-weight: bold; }
        .badge-alpa { background: #dc3545; padding: 4px 8px; border-radius: 4px; font-size: 0.8em; }
    </style>
</head>
<body>

    <h2>SAPD ADMINISTRATIVE PANEL</h2>

    <div class="tab-menu" style="margin-bottom: 20px;">
        <button class="tab-btn active" onclick="showTab(event, 'tab-rekap')">Log Kehadiran</button>
        <button class="tab-btn" onclick="showTab(event, 'tab-monitoring')">Monitoring Alpa</button>
    </div>

    <div id="tab-rekap" class="tab-content">
        <button class="btn-reset" onclick="hapusSemua()">Reset Absensi Mingguan</button>
        <div class="card">
            <table id="table-rekap">
                <thead><tr><th>Waktu</th><th>Nama</th><th>Jam Duty</th><th>Kegiatan</th><th>Bukti</th><th>Aksi</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="tab-monitoring" class="tab-content" style="display:none;">
        <div class="card">
            <h3>Belum Absen Hari Ini</h3>
            <table id="table-alpa">
                <thead><tr><th>Nama Anggota</th><th>Pangkat</th><th>Status</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

<script>
    const SUPABASE_URL = "https://urclmvdkfkfwvdascobs.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyY2xtdmRrZmtmd3ZkYXNjb2JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDkzMjQsImV4cCI6MjA5MTM4NTMyNH0.FE8ynCm5Pfg861wpG1rslSCLSNUnXSwyEIVbHiqajT4";
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadData() {
        const { data: logs } = await _supabase.from('absensi_sapd').select('*').order('created_at', { ascending: false });
        const { data: masters } = await _supabase.from('users_master').select('*');

        const tbodyRekap = document.querySelector('#table-rekap tbody');
        tbodyRekap.innerHTML = logs.map(row => `
            <tr>
                <td>${new Date(row.created_at).toLocaleString('id-ID')}</td>
                <td><b>${row.nama_anggota}</b><br><small>${row.pangkat}</small></td>
                <td>${row.jam_duty || '-'}</td>
                <td>${row.kegiatan || '-'}</td>
                <td><a href="${row.bukti_foto}" target="_blank" class="img-link">Lihat SS</a></td>
                <td><button onclick="hapusData('${row.id}')" style="background:#dc3545; color:white; border:none; cursor:pointer;">Hapus</button></td>
            </tr>
        `).join('');

        const hariIni = new Date().toLocaleDateString('id-ID');
        const idSudahAbsen = logs.filter(l => new Date(l.created_at).toLocaleDateString('id-ID') === hariIni).map(l => l.discord_id);
        const bolos = masters.filter(m => !idSudahAbsen.includes(m.discord_id));

        const tbodyAlpa = document.querySelector('#table-alpa tbody');
        tbodyAlpa.innerHTML = bolos.map(m => `<tr><td>${m.nama_anggota}</td><td>${m.pangkat}</td><td><span class="badge-alpa">ALPA</span></td></tr>`).join('');
    }

    async function hapusData(id) { if(confirm("Hapus?")) { await _supabase.from('absensi_sapd').delete().eq('id', id); loadData(); } }
    async function hapusSemua() { if(confirm("Reset semua log?")) { await _supabase.from('absensi_sapd').delete().neq('id', 0); loadData(); } }
    function showTab(e, id) { document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none'); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(id).style.display = 'block'; e.target.classList.add('active'); }
    loadData();
</script>
</body>
</html>
