<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPD Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; border-top: 5px solid var(--primary); }
        h2, h4 { text-align: center; }
        input, textarea { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #30475e; background: #1a1a2e; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; margin-top: 15px; }
        #status-msg { text-align: center; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="app-content" style="display: none;">
        <h2 id="name-tag">Username</h2>
        <h4 id="rank-tag" style="color: #888; font-weight: normal;">Pangkat</h4>

        <form id="form-absen">
            <input type="text" id="jam_duty" placeholder="Jam Duty (19:00 - 21:00)" required>
            <textarea id="kegiatan" rows="3" placeholder="Kegiatan selama duty..." required></textarea>
            <label style="display:block; margin-top:10px; font-size: 0.8em; color: #aaa;">Bukti Foto:</label>
            <input type="file" id="bukti_foto" accept="image/*" required>
            <button type="submit" id="btn-submit">Kirim Absensi</button>
        </form>
        <div id="status-msg"></div>
    </div>
    
    <div id="loading-msg" style="text-align: center;">
        <h3>Memverifikasi Akses...</h3>
    </div>
</div>

<script>
    const _supabase = window.supabase.createClient("https://urclmvdkfkfwvdascobs.supabase.co", "ISI_ANON_KEY_LU");
    const urlParams = new URLSearchParams(window.location.search);
    const discordId = urlParams.get('id');

    // --- LOGIKA UTAMA: PENGECEKAN ROLE ---
    async function performSecurityAudit() {
        if (!discordId) return kickUser("ID Tidak Ditemukan");

        // Ambil data terbaru dari users_master
        const { data: user, error } = await _supabase
            .from('users_master')
            .select('*')
            .eq('discord_id', discordId)
            .single();

        // LOGIKA LU: Jika user tidak ada di database ATAU role_inti di db terset "-"
        // (Asumsi lu punya kolom 'role_inti' di tabel users_master)
        if (error || !user || user.role_inti === "-") {
            
            // Hapus data dari users_master (Self-Cleaning)
            await _supabase.from('users_master').delete().eq('discord_id', discordId);
            
            kickUser("AKSES DICABUT: Anda sudah tidak memiliki Role Inti.");
            return null;
        }

        return user;
    }

    function kickUser(msg) {
        alert(msg);
        window.location.href = "index.html"; // Tendang ke login
    }

    // Jalankan saat pertama buka
    async function start() {
        const user = await performSecurityAudit();
        if (user) {
            document.getElementById('loading-msg').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            document.getElementById('name-tag').innerText = user.nama_anggota;
            document.getElementById('rank-tag').innerText = `${user.pangkat} | ${user.divisi}`;
        }
    }

    // Jalankan saat Klik Kirim (Pengecekan Menit Terakhir)
    document.getElementById('form-absen').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        
        // Cek lagi sebelum upload, kalo pas nyangkut ternyata role_inti udah jadi "-" di db
        const activeUser = await performSecurityAudit();
        if (!activeUser) return;

        btn.disabled = true;
        btn.innerText = "Mengirim...";

        // Lanjutkan proses upload seperti biasa...
        // ... (Kode upload storage dan insert ke absensi_sapd) ...
        
        // Contoh ringkas insert:
        const file = document.getElementById('bukti_foto').files[0];
        const fileName = `absensi/${Date.now()}.png`;
        await _supabase.storage.from('absensi-bukti').upload(fileName, file);
        const { data: pUrl } = _supabase.storage.from('bukti-absen').getPublicUrl(fileName);

        await _supabase.from('absensi_sapd').insert([{
            discord_id: discordId,
            nama_anggota: activeUser.nama_anggota,
            pangkat: activeUser.pangkat,
            jam_duty: document.getElementById('jam_duty').value,
            kegiatan: document.getElementById('kegiatan').value,
            bukti_foto: pUrl.publicUrl
        }]);

        document.getElementById('status-msg').innerText = "✔ Berhasil!";
        btn.disabled = false;
        btn.innerText = "Kirim Absensi";
    });

    start();
</script>
</body>
</html>
