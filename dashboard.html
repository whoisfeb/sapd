<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPD Dashboard - Integrated Security</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; --text: #ffffff; --success: #2ecc71; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 450px; border-top: 5px solid var(--primary); }
        h2 { text-align: center; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        h4 { text-align: center; color: #888; font-weight: normal; margin-bottom: 25px; border-bottom: 1px solid #30475e; padding-bottom: 15px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85em; color: #aaa; }
        input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30475e; background: #1a1a2e; color: white; box-sizing: border-box; font-size: 14px; transition: 0.3s; }
        input:focus, textarea:focus { border-color: var(--primary); outline: none; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px; }
        button:hover { background: #ff5e78; transform: translateY(-2px); }
        button:disabled { background: #555; cursor: not-allowed; transform: none; }
        #status-msg { text-align: center; margin-top: 15px; font-size: 0.9em; font-weight: bold; min-height: 1.5em; }
        .loading-overlay { text-align: center; padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-screen" class="loading-overlay">
        <h3>Memvalidasi Sesi...</h3>
        <p style="color: #666; font-size: 0.8em;">Menghubungkan ke API SAPD</p>
    </div>

    <div id="dashboard-content" style="display: none;">
        <h2 id="name-display">Username</h2>
        <h4 id="rank-display">Pangkat | Divisi</h4>

        <form id="absensi-form">
            <div class="form-group">
                <label>Jam Duty (Contoh: 19:00 - 21:00)</label>
                <input type="text" id="jam_duty" placeholder="Jam mulai s/d selesai" required>
            </div>
            <div class="form-group">
                <label>Kegiatan</label>
                <textarea id="kegiatan" rows="3" placeholder="Apa saja yang dilakukan?" required></textarea>
            </div>
            <div class="form-group">
                <label>Bukti Foto (SS SAMP)</label>
                <input type="file" id="bukti_foto" accept="image/*" required>
            </div>
            <button type="submit" id="btn-submit">Kirim Absensi</button>
        </form>
        <div id="status-msg"></div>
    </div>
</div>

<script>
    // 1. Inisialisasi Supabase (Tetap diperlukan untuk upload foto)
    const SUPABASE_URL = "https://urclmvdkfkfwvdascobs.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyY2xtdmRrZmtmd3ZkYXNjb2JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDkzMjQsImV4cCI6MjA5MTM4NTMyNH0.FE8ynCm5Pfg861wpG1rslSCLSNUnXSwyEIVbHiqajT4"; // Ganti dengan key anda
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const discordId = urlParams.get('id');
    const urlName = urlParams.get('name');
    const urlPangkat = urlParams.get('pangkat');
    const urlDivisi = urlParams.get('divisi');

    // 2. Fungsi Kick jika tidak ada ID
    function checkInitialAuth() {
        if (!discordId) {
            window.location.href = "index.html";
            return;
        }
        document.getElementById('loading-screen').style.display = 'none';
        document.getElementById('dashboard-content').style.display = 'block';
        document.getElementById('name-display').innerText = decodeURIComponent(urlName || "Unknown");
        document.getElementById('rank-display').innerText = `${decodeURIComponent(urlPangkat || "Unknown")} | ${decodeURIComponent(urlDivisi || "-")}`;
    }

    // 3. Logika Submit (Verifikasi Backend)
    document.getElementById('absensi-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const btn = document.getElementById('btn-submit');
        const msg = document.getElementById('status-msg');
        
        btn.disabled = true;
        btn.innerText = "Memverifikasi Role...";
        msg.innerText = "";

        // A. Upload Foto ke Supabase Storage
        const file = document.getElementById('bukti_foto').files[0];
        const fileName = `absensi/${Date.now()}_${discordId}.png`;

        try {
            const { data: storageData, error: storageError } = await _supabase.storage
                .from('bukti-absen')
                .upload(fileName, file);

            if (storageError) throw new Error("Gagal upload foto");

            const { data: publicUrl } = _supabase.storage.from('bukti-absen').getPublicUrl(fileName);

            // B. Kirim Data ke Netlify Function untuk Cek Role & Simpan
            const payload = {
                discordId: discordId,
                nama_anggota: document.getElementById('name-display').innerText,
                pangkat: urlPangkat,
                jam_duty: document.getElementById('jam_duty').value,
                kegiatan: document.getElementById('kegiatan').value,
                bukti_foto: publicUrl.publicUrl
            };

            const response = await fetch('/.netlify/functions/submit-absensi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.status === 403) {
                // INI ADALAH TRIGGER JIKA ROLE DICABUT
                alert("AKSES DITOLAK: Role Inti Anda tidak ditemukan di Discord. Anda akan dikeluarkan.");
                window.location.href = "index.html";
                return;
            }

            if (!response.ok) throw new Error("Gagal verifikasi data");

            msg.innerText = "✔ Absensi Berhasil Terkirim!";
            msg.style.color = var(--success);
            document.getElementById('absensi-form').reset();

        } catch (err) {
            msg.innerText = "Gagal: " + err.message;
            msg.style.color = var(--primary);
        } finally {
            btn.disabled = false;
            btn.innerText = "Kirim Absensi";
        }
    });

    checkInitialAuth();
</script>

</body>
</html>
