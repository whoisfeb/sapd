<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPD Dashboard - Absensi</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; border-top: 5px solid var(--primary); }
        .user-info { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #30475e; }
        input[type="file"] { margin: 15px 0; font-size: 0.8em; }
        .btn-absen { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .btn-absen:disabled { background: #555; cursor: not-allowed; }
        .holiday-msg { color: var(--primary); font-weight: bold; font-size: 1.5em; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="user-info">
        <h3 id="user-name">Memuat...</h3>
        <p id="user-pangkat" style="color: #aaa;"></p>
    </div>

    <div id="absensi-section">
        <p>Silakan upload bukti foto kegiatan (SS SAMP):</p>
        <input type="file" id="bukti-foto" accept="image/*">
        <button id="btn-submit" class="btn-absen" onclick="kirimAbsen()">Kirim Absensi</button>
    </div>

    <div id="holiday-section" class="holiday-msg">
        LIBUR WOI!<br>
        <span style="font-size: 0.5em; color: gray;">Hari Minggu waktunya istirahat.</span>
    </div>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get('id');
    const userName = params.get('name');
    const userPangkat = params.get('pangkat');

    const SUPABASE_URL = "https://urclmvdkfkfwvdascobs.supabase.co";
    const SUPABASE_KEY = "ISI_ANON_KEY_KAMU"; 
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    document.getElementById('user-name').innerText = userName || "User";
    document.getElementById('user-pangkat').innerText = userPangkat || "-";

    // Cek Hari Minggu
    const hariIni = new Date().getDay(); 
    if (hariIni === 0) {
        document.getElementById('absensi-section').style.display = 'none';
        document.getElementById('holiday-section').style.display = 'block';
    }

    async function kirimAbsen() {
        const fileInput = document.getElementById('bukti-foto');
        const btn = document.getElementById('btn-submit');

        if (!fileInput.files[0]) return alert("Mana bukti fotonya? Jangan mau gaji buta!");

        btn.disabled = true;
        btn.innerText = "Mengirim...";

        try {
            const file = fileInput.files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}_${userId}.${fileExt}`;

            // 1. Upload ke Storage Bucket "bukti-absen"
            const { data: uploadData, error: uploadErr } = await _supabase.storage
                .from('bukti-absen')
                .upload(fileName, file);

            if (uploadErr) throw uploadErr;

            const publicUrl = _supabase.storage.from('bukti-absen').getPublicUrl(fileName).data.publicUrl;

            // 2. Insert ke Database
            const { error: dbErr } = await _supabase.from('absensi_sapd').insert({
                discord_id: userId,
                nama_anggota: userName,
                pangkat: userPangkat,
                tipe_absen: 'Hadir',
                bukti_foto: publicUrl
            });

            if (dbErr) throw dbErr;

            alert("Absensi berhasil dikirim!");
            fileInput.value = "";
        } catch (err) {
            alert("Error: " + err.message);
        } finally {
            btn.disabled = false;
            btn.innerText = "Kirim Absensi";
        }
    }
</script>
</body>
</html>
