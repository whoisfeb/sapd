<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPD Dashboard - Panel Anggota</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; --text: #ffffff; --success: #2ecc71; --secondary: #0f3460; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .container { background: var(--card); padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 450px; border-top: 5px solid var(--primary); position: relative; }
        
        /* Navigasi Bar */
        .nav-bar { display: flex; justify-content: space-between; margin-bottom: 20px; gap: 10px; }
        .nav-btn { flex: 1; padding: 8px; border: none; border-radius: 5px; cursor: pointer; font-size: 0.8em; font-weight: bold; text-decoration: none; text-align: center; color: white; transition: 0.3s; }
        .btn-logout { background: #444; }
        .btn-logout:hover { background: #666; }
        .btn-admin { background: #f39c12; display: none; } /* Tersembunyi default */
        .btn-admin:hover { background: #e67e22; }

        h2 { text-align: center; margin-top: 10px; margin-bottom: 5px; text-transform: uppercase; }
        h4 { text-align: center; color: #888; font-weight: normal; margin-bottom: 25px; border-bottom: 1px solid #30475e; padding-bottom: 15px; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 0.85em; color: #aaa; }
        input, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #30475e; background: #1a1a2e; color: white; box-sizing: border-box; }
        
        button#btn-submit { width: 100%; padding: 12px; border: none; border-radius: 8px; background: var(--primary); color: white; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; font-size: 16px; }
        button#btn-submit:disabled { background: #555; cursor: not-allowed; }
        
        #status-msg { text-align: center; margin-top: 15px; font-size: 0.9em; font-weight: bold; min-height: 1.5em; }
    </style>
</head>
<body>

<div class="container">
    <div class="nav-bar">
        <a href="#" class="nav-btn btn-logout" onclick="logout()">Logout</a>
        <a href="rekap.html" id="admin-link" class="nav-btn btn-admin">Panel Rekap</a>
    </div>

    <div id="dashboard-content">
        <h2 id="name-display">Memuat...</h2>
        <h4 id="rank-display">Pangkat | Divisi</h4>

        <form id="absensi-form">
            <div class="form-group">
                <label>Jam Duty (Contoh: 19:00 - 21:00)</label>
                <input type="text" id="jam_duty" placeholder="Jam mulai s/d selesai" required>
            </div>
            <div class="form-group">
                <label>Kegiatan</label>
                <textarea id="kegiatan" rows="3" placeholder="Apa saja yang dilakukan?" required></textarea>
            </div>
            <div class="form-group">
                <label>Bukti Foto (SS SAMP)</label>
                <input type="file" id="bukti_foto" accept="image/*" required>
            </div>
            <button type="submit" id="btn-submit">Kirim Absensi</button>
        </form>
        <div id="status-msg"></div>
    </div>
</div>

<script>
    // 1. Inisialisasi Supabase
    const SUPABASE_URL = "https://urclmvdkfkfwvdascobs.supabase.co";
    const SUPABASE_ANON_KEY = "YOUR_ANON_KEY"; 
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const urlParams = new URLSearchParams(window.location.search);
    const discordId = urlParams.get('id');
    const urlName = urlParams.get('name');
    const urlPangkat = urlParams.get('pangkat');
    const urlDivisi = urlParams.get('divisi');
    const isAdmin = urlParams.get('admin') === 'true'; // Cek status admin dari URL

    // Tampilkan data & Cek Tombol Admin
    if (!discordId) {
        window.location.href = "index.html";
    } else {
        document.getElementById('name-display').innerText = decodeURIComponent(urlName || "Unknown");
        document.getElementById('rank-display').innerText = `${decodeURIComponent(urlPangkat || "Unknown")} | ${decodeURIComponent(urlDivisi || "-")}`;
        
        // Tampilkan tombol admin jika status admin=true
        if (isAdmin) {
            document.getElementById('admin-link').style.display = 'block';
        }
    }

    function logout() {
        if (confirm("Apakah anda ingin logout?")) {
            window.location.href = "index.html";
        }
    }

    // 2. Logika Submit (Tembak ke Netlify Function)
    document.getElementById('absensi-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btn-submit');
        const msg = document.getElementById('status-msg');
        
        btn.disabled = true;
        btn.innerText = "Memverifikasi Role & Mengirim...";
        msg.innerText = "";

        const file = document.getElementById('bukti_foto').files[0];
        const fileName = `absensi/${Date.now()}_${discordId}.png`;

        try {
            // A. Upload Foto
            const { error: storageError } = await _supabase.storage
                .from('bukti-absen')
                .upload(fileName, file);

            if (storageError) throw new Error("Gagal upload foto");

            const { data: publicUrl } = _supabase.storage.from('bukti-absen').getPublicUrl(fileName);

            // B. Kirim ke Backend (submit-absensi)
            const payload = {
                discordId: discordId,
                nama_anggota: document.getElementById('name-display').innerText,
                pangkat: urlPangkat || "Unknown",
                jam_duty: document.getElementById('jam_duty').value,
                kegiatan: document.getElementById('kegiatan').value,
                bukti_foto: publicUrl.publicUrl
            };

            const response = await fetch('/.netlify/functions/submit-absensi', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.status === 403) {
                alert("AKSES DITOLAK: Role Anda dicabut!");
                window.location.href = "index.html";
                return;
            }

            if (!response.ok) throw new Error("Gagal verifikasi data");

            msg.innerText = "✔ Absensi Berhasil Terkirim!";
            msg.style.color = "#2ecc71";
            document.getElementById('absensi-form').reset();

        } catch (err) {
            msg.innerText = "Gagal: " + err.message;
            msg.style.color = "#e94560";
        } finally {
            btn.disabled = false;
            btn.innerText = "Kirim Absensi";
        }
    });
</script>

</body>
</html>
