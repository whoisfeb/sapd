<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SAPD Admin - Rekap & Payroll Berurutan</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; --text: #ffffff; --success: #27ae60; --info: #2980b9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        
        .header-area { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 10px; }
        .action-buttons { display: flex; gap: 10px; flex-wrap: wrap; }
        
        .card { background: var(--card); padding: 20px; border-radius: 10px; margin-bottom: 20px; border-top: 4px solid var(--primary); overflow-x: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.75em; min-width: 1200px; }
        th, td { border: 1px solid #30475e; padding: 10px; text-align: center; }
        th { background: #0f3460; position: sticky; top: 0; z-index: 10; }
        
        .btn { padding: 10px 18px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; color: white; transition: 0.2s; font-size: 0.85em; text-decoration: none; display: inline-block; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        
        .btn-back { background: #444; }
        .btn-reset { background: var(--primary); }
        .btn-excel { background: var(--success); }
        .btn-pdf { background: var(--info); }
        .btn-warning { background: #f39c12; padding: 4px 8px; cursor: pointer; border-radius: 3px; border:none; color:white; font-size: 0.9em; }
        
        .salary-text { color: #2ecc71; font-weight: bold; }
        .check-icon { color: #2ecc71; font-weight: bold; font-size: 1.2em; }
        .cross-icon { color: #e94560; opacity: 0.3; font-size: 1.1em; }
        .nav-btn-small { background: #30475e; color: white; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .nav-btn-small:hover { background: #4e6e8e; }
    </style>
</head>
<body>

    <div class="header-area">
        <div>
            <h2 style="margin: 0 0 5px 0;">SAPD ADMIN - REKAP & PAYROLL</h2>
            <p style="color: #888; margin: 0;">Kelola data kehadiran dan penggajian anggota secara otomatis.</p>
        </div>
        <div class="action-buttons">
            <a href="javascript:history.back()" class="btn btn-back">⬅ Kembali ke Dashboard</a>
            <button class="btn btn-reset" onclick="resetAllWeeklyData()">🔥 Reset Minggu Ini</button>
            <button class="btn btn-excel" onclick="downloadExcel()">📊 Excel</button>
            <button class="btn btn-pdf" onclick="downloadPDF()">📄 PDF</button>
        </div>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:center; align-items:center; gap:25px; margin-bottom:20px;">
            <button class="nav-btn-small" onclick="changeWeek(-1)">◀ Minggu Sebelumnya</button>
            <h3 id="label-minggu" style="margin:0; min-width: 250px; text-align: center; color: #f39c12;">Memuat periode...</h3>
            <button class="nav-btn-small" onclick="changeWeek(1)">Minggu Depan ▶</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nama Anggota</th>
                    <th>Pangkat</th>
                    <th>Sen</th><th>Sel</th><th>Rab</th><th>Kam</th><th>Jum</th><th>Sab</th>
                    <th>Total Hadir</th>
                    <th>Estimasi Gaji</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tbody-weekly"></tbody>
        </table>
    </div>

<script>
    const _supabase = window.supabase.createClient("https://urclmvdkfkfwvdascobs.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyY2xtdmRrZmtmd3ZkYXNjb2JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDkzMjQsImV4cCI6MjA5MTM4NTMyNH0.FE8ynCm5Pfg861wpG1rslSCLSNUnXSwyEIVbHiqajT4");

    const RANK_ORDER = {
        "CHIEF OF POLICE": 1, "ASSISTANT CHIEF OF POLICE": 2, "DEPUTY CHIEF OF POLICE": 3, "COMMANDER": 4,
        "CAPTAIN III": 5, "CAPTAIN II": 6, "CAPTAIN I": 7, "LIEUTENANT III": 8, "LIEUTENANT II": 9, "LIEUTENANT I": 10,
        "SERGEANT III": 11, "SERGEANT II": 12, "SERGEANT I": 13, "DETECTIVE III": 14, "DETECTIVE II": 15, "DETECTIVE I": 16,
        "POLICE OFFICER III": 17, "POLICE OFFICER II": 18, "POLICE OFFICER I": 19, "CADET": 20
    };

    const BASE_SALARY = {
        "CHIEF OF POLICE": 80000, "ASSISTANT CHIEF OF POLICE": 76000, "DEPUTY CHIEF OF POLICE": 72000, "COMMANDER": 68000,
        "CAPTAIN III": 64000, "CAPTAIN II": 60000, "CAPTAIN I": 56000, "LIEUTENANT III": 52000, "LIEUTENANT II": 48000, "LIEUTENANT I": 45000,
        "SERGEANT III": 42000, "SERGEANT II": 40000, "SERGEANT I": 38000, "DETECTIVE III": 36000, "DETECTIVE II": 34000, "DETECTIVE I": 32000,
        "POLICE OFFICER III": 30000, "POLICE OFFICER II": 28000, "POLICE OFFICER I": 26000, "CADET": 24000
    };

    let currentWeekOffset = 0;

    function getWeekRange(offset = 0) {
        const now = new Date();
        now.setDate(now.getDate() + (offset * 7));
        const day = now.getDay();
        const diff = now.getDate() - day + (day === 0 ? -6 : 1);
        const mon = new Date(now.setDate(diff)); mon.setHours(0,0,0,0);
        const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
        return { mon, sun };
    }

    async function loadData() {
        const { mon, sun } = getWeekRange(currentWeekOffset);
        document.getElementById('label-minggu').innerText = `${mon.toLocaleDateString('id-ID')} - ${sun.toLocaleDateString('id-ID')}`;

        const { data: logs } = await _supabase.from('absensi_sapd').select('*').gte('created_at', mon.toISOString()).lte('created_at', sun.toISOString());
        const { data: masters } = await _supabase.from('users_master').select('*');

        masters.sort((a, b) => (RANK_ORDER[a.pangkat.toUpperCase()] || 99) - (RANK_ORDER[b.pangkat.toUpperCase()] || 99));

        const userWeekly = {};
        masters.forEach(m => {
            userWeekly[m.discord_id] = { info: m, days: { 1:null, 2:null, 3:null, 4:null, 5:null, 6:null }, totalHadir: 0 };
        });

        logs.forEach(log => {
            const d = new Date(log.created_at).getDay();
            if (userWeekly[log.discord_id] && d !== 0) {
                userWeekly[log.discord_id].days[d] = log.bukti_foto;
                // Deteksi kehadiran aktif (bukan izin/cuti)
                if (!log.jam_duty.includes("IZIN") && !log.jam_duty.includes("CUTI")) {
                    userWeekly[log.discord_id].totalHadir++;
                }
            }
        });

        document.getElementById('tbody-weekly').innerHTML = masters.map(m => {
            const u = userWeekly[m.discord_id];
            const gajiPokok = BASE_SALARY[u.info.pangkat.toUpperCase()] || 0;
            let totalGaji = (gajiPokok / 5) * Math.min(u.totalHadir, 5);
            if (u.totalHadir >= 6) totalGaji += 10000;

            const warningBtn = (u.totalHadir < 3) 
                ? `<button class="btn-warning" onclick="sendWarning('${u.info.discord_id}', '${u.info.nama_anggota}')">⚠️ Warning</button>` 
                : `<span style="color:gray; font-size:0.9em;">Aman</span>`;

            const renderIcon = (idx) => u.days[idx] ? `<span class="check-icon">✔</span>` : `<span class="cross-icon">✘</span>`;

            return `
                <tr>
                    <td style="text-align:left;"><b>${u.info.nama_anggota}</b></td>
                    <td>${u.info.pangkat}</td>
                    <td>${renderIcon(1)}</td><td>${renderIcon(2)}</td><td>${renderIcon(3)}</td>
                    <td>${renderIcon(4)}</td><td>${renderIcon(5)}</td><td>${renderIcon(6)}</td>
                    <td>${u.totalHadir} / 6 Hari</td>
                    <td class="salary-text">$${Math.floor(totalGaji).toLocaleString()}</td>
                    <td>${warningBtn}</td>
                    <td><button onclick="resetUser('${u.info.discord_id}')" style="background:none; border:none; cursor:pointer; font-size:1.2em;">🗑</button></td>
                </tr>`;
        }).join('');
    }

    // --- FUNGSI DOWNLOAD ---
    function downloadExcel() {
        const table = document.querySelector("table");
        const dateRange = document.getElementById('label-minggu').innerText;
        const wb = XLSX.utils.table_to_book(table, { sheet: "Rekap Gaji" });
        XLSX.writeFile(wb, `Rekap_SAPD_${dateRange.replace(/ /g, '_')}.xlsx`);
    }

    function downloadPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('l', 'mm', 'a4');
        const dateRange = document.getElementById('label-minggu').innerText;

        doc.setFontSize(18);
        doc.text("REKAPITULASI GAJI & ABSENSI SAPD", 14, 15);
        doc.setFontSize(11);
        doc.text(`Periode: ${dateRange}`, 14, 22);

        doc.autoTable({
            html: 'table',
            startY: 30,
            theme: 'grid',
            headStyles: { fillColor: [233, 69, 96] },
            didParseCell: function(data) {
                if (data.column.index === 11) data.cell.text = ""; // Sembunyikan kolom "Aksi"
            }
        });
        doc.save(`Rekap_SAPD_${dateRange.replace(/ /g, '_')}.pdf`);
    }

    async function resetAllWeeklyData() {
        if (!confirm("Hapus semua data absensi minggu ini? Gambar di storage juga akan dihapus.")) return;
        const { mon, sun } = getWeekRange(currentWeekOffset);
        const { data: logs } = await _supabase.from('absensi_sapd').select('bukti_foto').gte('created_at', mon.toISOString()).lte('created_at', sun.toISOString());
        
        const filePaths = logs.filter(l => l.bukti_foto && l.bukti_foto !== "N/A").map(l => l.bukti_foto.split('/bukti-absen/')[1]);
        if (filePaths.length > 0) await _supabase.storage.from('bukti-absen').remove(filePaths);

        await _supabase.from('absensi_sapd').delete().gte('created_at', mon.toISOString()).lte('created_at', sun.toISOString());
        alert("Pembersihan selesai.");
        loadData();
    }

    function sendWarning(id, nama) {
        alert(`Warning dikirim ke Discord: ${nama} (${id}) terdeteksi tidak aktif.`);
    }

    async function resetUser(id) {
        if(confirm("Hapus data anggota ini di minggu ini saja?")) {
            const { mon, sun } = getWeekRange(currentWeekOffset);
            await _supabase.from('absensi_sapd').delete().eq('discord_id', id).gte('created_at', mon.toISOString()).lte('created_at', sun.toISOString());
            loadData();
        }
    }

    function changeWeek(dir) { currentWeekOffset += dir; loadData(); }
    loadData();
</script>
</body>
</html>
