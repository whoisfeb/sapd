<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SAPD Admin - Rekap Detail</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; }
        body { font-family: sans-serif; background: var(--bg); color: white; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; margin-bottom: 20px; border-top: 4px solid var(--primary); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; min-width: 800px; }
        th, td { border: 1px solid #30475e; padding: 12px; text-align: left; vertical-align: top; }
        th { background: #0f3460; }
        .btn-reset { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 15px; font-weight: bold; }
        .img-link { color: #00d2ff; text-decoration: none; font-weight: bold; }
        .text-kegiatan { max-width: 250px; word-wrap: break-word; font-style: italic; color: #ccc; }
    </style>
</head>
<body>

    <h2>SAPD ADMINISTRATIVE PANEL</h2>

    <div class="card">
        <h3>Log Absensi & Laporan Duty</h3>
        <button class="btn-reset" onclick="hapusSemua()">Reset Absensi Mingguan</button>
        <table id="table-rekap">
            <thead>
                <tr>
                    <th>Waktu Input</th>
                    <th>Nama & Pangkat</th>
                    <th>Jam Duty</th>
                    <th>Kegiatan</th>
                    <th>Bukti</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

<script>
    const SUPABASE_URL = "https://urclmvdkfkfwvdascobs.supabase.co";
    const SUPABASE_KEY = "ISI_ANON_KEY_KAMU";
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function loadData() {
        const { data: logs, error } = await _supabase.from('absensi_sapd').select('*').order('created_at', { ascending: false });
        if (error) return console.error(error);

        const tbody = document.querySelector('#table-rekap tbody');
        tbody.innerHTML = logs.map(row => `
            <tr>
                <td>${new Date(row.created_at).toLocaleString('id-ID')}</td>
                <td><b>${row.nama_anggota}</b><br><small>${row.pangkat}</small></td>
                <td>${row.jam_duty || '-'}</td>
                <td class="text-kegiatan">${row.kegiatan || '-'}</td>
                <td><a href="${row.bukti_foto}" target="_blank" class="img-link">Lihat Foto</a></td>
                <td><button onclick="hapusData('${row.id}')" style="background:#dc3545; color:white; border:none; border-radius:3px; cursor:pointer;">Hapus</button></td>
            </tr>
        `).join('');
    }

    async function hapusData(id) {
        if(!confirm("Hapus laporan ini?")) return;
        await _supabase.from('absensi_sapd').delete().eq('id', id);
        loadData();
    }

    async function hapusSemua() {
        if(!confirm("Reset semua data minggu ini? (Data di users_master tetap aman)")) return;
        await _supabase.from('absensi_sapd').delete().neq('id', 0);
        loadData();
    }

    loadData();
</script>
</body>
</html>
