<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAPD - Admin High Command</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; border-top: 4px solid var(--primary); margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
        th, td { border: 1px solid #30475e; padding: 10px; text-align: left; }
        th { background: #0f3460; color: #fff; }
        .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75em; font-weight: bold; }
        .status-hadir { background: #28a745; color: white; }
        .status-bolos { background: #dc3545; color: white; }
        .tab-menu { margin-bottom: 20px; border-bottom: 2px solid #30475e; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; color: gray; cursor: pointer; font-size: 1.1em; margin-right: 20px; padding: 5px 10px; }
        .tab-btn.active { color: var(--primary); border-bottom: 2px solid var(--primary); font-weight: bold; }
        .error-msg { color: #ff4d4d; background: rgba(255,0,0,0.1); padding: 10px; border-radius: 5px; display: none; }
    </style>
</head>
<body>
    <h2>SAPD ADMINISTRATIVE PANEL</h2>
    
    <div id="error-box" class="error-msg"></div>

    <div class="tab-menu">
        <button class="tab-btn active" onclick="showTab(event, 'tab-kehadiran')">Rekap Kehadiran</button>
        <button class="tab-btn" onclick="showTab(event, 'tab-gaji')">Rekap Gaji</button>
        <button class="tab-btn" onclick="showTab(event, 'tab-monitoring')">Monitoring Role Inti</button>
    </div>

    <div id="tab-kehadiran" class="tab-content">
        <div class="card">
            <h3>Log Absensi Terbaru</h3>
            <table id="table-absen">
                <thead>
                    <tr><th>Waktu</th><th>Nama</th><th>Pangkat</th><th>Status</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="tab-gaji" class="tab-content" style="display:none;">
        <div class="card">
            <h3>Estimasi Gaji Mingguan</h3>
            <p style="font-size: 0.8em; color: #aaa;">Rumus: Hadir x $5.000</p>
            <table id="table-gaji">
                <thead>
                    <tr><th>Nama Anggota</th><th>Total Hadir</th><th>Total Gaji</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <div id="tab-monitoring" class="tab-content" style="display:none;">
        <div class="card">
            <h3>Anggota Belum Absen Hari Ini</h3>
            <p style="color: #e94560; font-size: 0.8em;">*Hanya menampilkan user yang sudah pernah terdaftar di database.</p>
            <table id="table-monitoring">
                <thead>
                    <tr><th>Nama Anggota</th><th>Status</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

<script>
    const SUPABASE_URL = "https://urclmvdkfkfwvdascobs.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyY2xtdmRrZmtmd3ZkYXNjb2JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDkzMjQsImV4cCI6MjA5MTM4NTMyNH0.FE8ynCm5Pfg861wpG1rslSCLSNUnXSwyEIVbHiqajT4";
    const _supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const GAJI_PER_HADIR = 5000;

    async function loadData() {
        const errorBox = document.getElementById('error-box');
        
        // 1. Ambil Data Kehadiran
        // Jika error 400 berlanjut, coba hapus bagian .order(...) untuk tes apakah kolom created_at tersedia
        const { data: logs, error } = await _supabase
            .from('absensi_sapd')
            .select('*')
            .order('created_at', { ascending: false });

        if (error) {
            errorBox.style.display = 'block';
            errorBox.innerText = "Error: " + error.message + " (Pastikan kolom 'created_at' ada di tabel)";
            console.error("Supabase Error:", error);
            return;
        }

        // Render Tab Kehadiran
        const tbodyAbsen = document.querySelector('#table-absen tbody');
        tbodyAbsen.innerHTML = logs.map(row => `
            <tr>
                <td>${new Date(row.created_at).toLocaleString('id-ID')}</td>
                <td>${row.nama_anggota}</td>
                <td>${row.pangkat || '-'}</td>
                <td><span class="badge status-hadir">${row.tipe_absen}</span></td>
            </tr>
        `).join('');

        // 2. Hitung Gaji
        const gajiMap = {};
        logs.forEach(row => {
            if(row.tipe_absen === 'Hadir') {
                gajiMap[row.nama_anggota] = (gajiMap[row.nama_anggota] || 0) + 1;
            }
        });

        const tbodyGaji = document.querySelector('#table-gaji tbody');
        tbodyGaji.innerHTML = Object.keys(gajiMap).map(nama => `
            <tr>
                <td>${nama}</td>
                <td>${gajiMap[nama]}x</td>
                <td>$${(gajiMap[nama] * GAJI_PER_HADIR).toLocaleString()}</td>
            </tr>
        `).join('');

        // 3. Monitoring Bolos
        const hariIni = new Date().toLocaleDateString();
        const sudahAbsenHariIni = logs
            .filter(l => new Date(l.created_at).toLocaleDateString() === hariIni)
            .map(l => l.nama_anggota);
            
        const semuaAnggota = [...new Set(logs.map(l => l.nama_anggota))]; 
        
        const bolos = semuaAnggota.filter(nama => !sudahAbsenHariIni.includes(nama));
        const tbodyMonitoring = document.querySelector('#table-monitoring tbody');
        tbodyMonitoring.innerHTML = bolos.length > 0 
            ? bolos.map(nama => `<tr><td>${nama}</td><td><span class="badge status-bolos">BELUM ABSEN HARI INI</span></td></tr>`).join('')
            : `<tr><td colspan="2" style="text-align:center;">Semua anggota sudah absen hari ini.</td></tr>`;
    }

    function showTab(event, tabId) {
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(tabId).style.display = 'block';
        event.currentTarget.classList.add('active');
    }

    // Jalankan fungsi
    loadData();
</script>
</body>
</html>
