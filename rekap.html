<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SAPD Admin - Rekap & Payroll</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; margin-bottom: 20px; border-top: 4px solid var(--primary); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75em; min-width: 1200px; }
        th, td { border: 1px solid #30475e; padding: 10px; text-align: center; }
        th { background: #0f3460; position: sticky; top: 0; }
        .btn { padding: 8px 15px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .btn-reset { background: #e94560; margin-bottom: 15px; }
        .btn-warning { background: #f39c12; padding: 2px 5px; cursor: pointer; border-radius: 3px; }
        .salary-text { color: #2ecc71; font-weight: bold; }
        .check-icon { color: #2ecc71; font-weight: bold; }
        .cross-icon { color: #e94560; opacity: 0.3; }
        .nav-btn-small { background: #30475e; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center;">
        <h2>SAPD ADMIN - REKAP & PAYROLL</h2>
        <button class="btn btn-reset" onclick="resetAllWeeklyData()">🔥 Reset Semua Data Minggu Ini</button>
    </div>

    <div class="card">
        <div style="display:flex; justify-content:center; align-items:center; gap:20px; margin-bottom:15px;">
            <button class="nav-btn-small" onclick="changeWeek(-1)">◀ Prev</button>
            <h3 id="label-minggu" style="margin:0;">Memuat periode...</h3>
            <button class="nav-btn-small" onclick="changeWeek(1)">Next ▶</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Nama</th>
                    <th>Pangkat</th>
                    <th>Sen</th><th>Sel</th><th>Rab</th><th>Kam</th><th>Jum</th><th>Sab</th>
                    <th>Total Hadir</th>
                    <th>Estimasi Gaji</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tbody-weekly"></tbody>
        </table>
    </div>

<script>
    const _supabase = window.supabase.createClient("https://urclmvdkfkfwvdascobs.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVyY2xtdmRrZmtmd3ZkYXNjb2JzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU4MDkzMjQsImV4cCI6MjA5MTM4NTMyNH0.FE8ynCm5Pfg861wpG1rslSCLSNUnXSwyEIVbHiqajT4");

    const BASE_SALARY = {
        "CHIEF OF POLICE": 80000, "ASSISTANT CHIEF OF POLICE": 76000, "DEPUTY CHIEF OF POLICE": 72000, "COMMANDER": 68000,
        "CAPTAIN III": 64000, "CAPTAIN II": 60000, "CAPTAIN I": 56000,
        "LIEUTENANT III": 52000, "LIEUTENANT II": 48000, "LIEUTENANT I": 45000,
        "SERGEANT III": 42000, "SERGEANT II": 40000, "SERGEANT I": 38000,
        "DETECTIVE III": 36000, "DETECTIVE II": 34000, "DETECTIVE I": 32000,
        "POLICE OFFICER III": 30000, "POLICE OFFICER II": 28000, "POLICE OFFICER I": 26000,
        "CADET": 24000
    };

    let currentWeekOffset = 0;

    function getWeekRange(offset = 0) {
        const now = new Date();
        now.setDate(now.getDate() + (offset * 7));
        const day = now.getDay();
        const diff = now.getDate() - day + (day === 0 ? -6 : 1);
        const mon = new Date(now.setDate(diff)); mon.setHours(0,0,0,0);
        const sun = new Date(mon); sun.setDate(mon.getDate() + 6); sun.setHours(23,59,59,999);
        return { mon, sun };
    }

    async function loadData() {
        const { mon, sun } = getWeekRange(currentWeekOffset);
        document.getElementById('label-minggu').innerText = `Periote: ${mon.toLocaleDateString('id-ID')} - ${sun.toLocaleDateString('id-ID')}`;

        const { data: logs } = await _supabase.from('absensi_sapd').select('*').gte('created_at', mon.toISOString()).lte('created_at', sun.toISOString());
        const { data: masters } = await _supabase.from('users_master').select('*');

        const userWeekly = {};
        masters.forEach(m => {
            userWeekly[m.discord_id] = { info: m, days: { 1:null, 2:null, 3:null, 4:null, 5:null, 6:null }, totalHadir: 0 };
        });

        logs.forEach(log => {
            const d = new Date(log.created_at).getDay();
            if (userWeekly[log.discord_id] && d !== 0) {
                userWeekly[log.discord_id].days[d] = log.bukti_foto;
                if (log.jam_duty !== "IZIN" && log.jam_duty !== "CUTI") {
                    userWeekly[log.discord_id].totalHadir++;
                }
            }
        });

        document.getElementById('tbody-weekly').innerHTML = Object.values(userWeekly).map(u => {
            const gajiPokok = BASE_SALARY[u.info.pangkat.toUpperCase()] || 0;
            let totalGaji = (gajiPokok / 5) * Math.min(u.totalHadir, 5);
            if (u.totalHadir >= 6) totalGaji += 10000; // Bonus Rajin

            const warningBtn = (u.totalHadir < 3) ? `<button class="btn-warning" onclick="sendWarning('${u.info.discord_id}', '${u.info.nama_anggota}')">⚠️ Warning</button>` : `<span style="color:gray">Aman</span>`;

            const renderIcon = (idx) => u.days[idx] ? `<span class="check-icon">✔</span>` : `<span class="cross-icon">✘</span>`;

            return `
                <tr>
                    <td style="text-align:left;"><b>${u.info.nama_anggota}</b></td>
                    <td>${u.info.pangkat}</td>
                    <td>${renderIcon(1)}</td><td>${renderIcon(2)}</td><td>${renderIcon(3)}</td>
                    <td>${renderIcon(4)}</td><td>${renderIcon(5)}</td><td>${renderIcon(6)}</td>
                    <td>${u.totalHadir} / 6 Hari</td>
                    <td class="salary-text">$${totalGaji.toLocaleString()}</td>
                    <td>${warningBtn}</td>
                    <td><button onclick="resetUser('${u.info.discord_id}')" style="background:none; border:none; cursor:pointer;">🗑</button></td>
                </tr>`;
        }).join('');
    }

    async function resetAllWeeklyData() {
        if (!confirm("PERINGATAN! Semua data absensi & gambar di minggu ini akan DIHAPUS PERMANEN. Lanjutkan?")) return;
        
        const { mon, sun } = getWeekRange(currentWeekOffset);
        
        // 1. Ambil list bukti_foto untuk dihapus dari storage
        const { data: logs } = await _supabase.from('absensi_sapd').select('bukti_foto').gte('created_at', mon.toISOString()).lte('created_at', sun.toISOString());
        
        const filePaths = logs.filter(l => l.bukti_foto !== "N/A").map(l => {
            const parts = l.bukti_foto.split('/bukti-absen/');
            return parts[1];
        });

        if (filePaths.length > 0) {
            await _supabase.storage.from('bukti-absen').remove(filePaths);
        }

        // 2. Hapus data dari Database
        await _supabase.from('absensi_sapd').delete().gte('created_at', mon.toISOString()).lte('created_at', sun.toISOString());
        
        alert("Data minggu ini berhasil dibersihkan!");
        loadData();
    }

    function sendWarning(id, nama) {
        // Nanti format kirim ke discord ditaruh di sini sesuai permintaanmu
        console.log(`Mengirim peringatan SP-1 untuk ${nama} (${id})`);
        alert(`Peringatan 3 hari bolos untuk ${nama} telah diproses.`);
    }

    async function resetUser(id) {
        if(confirm("Hapus data user ini di minggu ini saja?")) {
            const { mon, sun } = getWeekRange(currentWeekOffset);
            await _supabase.from('absensi_sapd').delete().eq('discord_id', id).gte('created_at', mon.toISOString()).lte('created_at', sun.toISOString());
            loadData();
        }
    }

    function changeWeek(dir) { currentWeekOffset += dir; loadData(); }
    loadData();
</script>
</body>
</html>
