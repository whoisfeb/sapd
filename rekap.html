<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>SAPD Admin - Weekly Rekap</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary: #e94560; --bg: #1a1a2e; --card: #16213e; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; padding: 20px; }
        .card { background: var(--card); padding: 20px; border-radius: 10px; margin-bottom: 20px; border-top: 4px solid var(--primary); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75em; min-width: 1000px; }
        th, td { border: 1px solid #30475e; padding: 10px; text-align: center; }
        th { background: #0f3460; }
        
        /* Navigasi Periode */
        .period-nav { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .nav-btn-small { background: #30475e; color: white; border: none; padding: 5px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .nav-btn-small:hover { background: var(--primary); }

        .tab-btn { background: none; border: none; color: gray; cursor: pointer; font-size: 1.1em; margin-right: 20px; padding-bottom: 5px; font-weight: bold; }
        .tab-btn.active { color: var(--primary); border-bottom: 3px solid var(--primary); }
        .check-icon { color: #2ecc71; font-weight: bold; font-size: 1.2em; text-decoration: none; }
        .cross-icon { color: #e94560; font-weight: bold; opacity: 0.3; }
        .badge-alpa { background: #e94560; padding: 2px 8px; border-radius: 4px; font-size: 0.9em; }
    </style>
</head>
<body>

    <h2>SAPD ADMIN - WEEKLY MONITORING</h2>

    <div class="tab-menu" style="margin-bottom: 25px;">
        <button class="tab-btn active" onclick="showTab(event, 'tab-rekap')">Riwayat Mingguan</button>
        <button class="tab-btn" onclick="showTab(event, 'tab-monitoring')">Alpa (Hari Ini)</button>
    </div>

    <div id="tab-rekap" class="tab-content">
        <div class="card">
            <div class="period-nav">
                <button class="nav-btn-small" onclick="changeWeek(-1)">◀ Prev</button>
                <h3 id="label-minggu" style="margin: 0; min-width: 300px; text-align: center;">Memuat periode...</h3>
                <button class="nav-btn-small" onclick="changeWeek(1)">Next ▶</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Nama</th>
                        <th>Pangkat</th>
                        <th>Divisi</th>
                        <th>Sen</th>
                        <th>Sel</th>
                        <th>Rab</th>
                        <th>Kam</th>
                        <th>Jum</th>
                        <th>Sab</th>
                        <th>Min</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody id="tbody-weekly"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-monitoring" class="tab-content" style="display:none;">
        <div class="card">
            <h3>Belum Absen Hari Ini (Monitoring Real-time)</h3>
            <table id="table-alpa">
                <thead>
                    <tr><th>Nama</th><th>Pangkat</th><th>Divisi</th><th>Status</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

<script>
    const _supabase = window.supabase.createClient("https://urclmvdkfkfwvdascobs.supabase.co", "YOUR_ANON_KEY");

    const RANK_PRIORITY = {
        "CHIEF OF POLICE": 1, "ASSISTANT CHIEF OF POLICE": 2, "DEPUTY CHIEF OF POLICE": 3,
        "COMMANDER": 4, "CAPTAIN III": 5, "CAPTAIN II": 6, "CAPTAIN I": 7,
        "LIEUTENANT III": 8, "LIEUTENANT II": 9, "LIEUTENANT I": 10,
        "SERGEANT III": 11, "SERGEANT II": 12, "SERGEANT I": 13,
        "DETECTIVE III": 14, "DETECTIVE II": 15, "DETECTIVE I": 16,
        "POLICE OFFICER III": 17, "POLICE OFFICER II": 18, "POLICE OFFICER I": 19,
        "CADET": 20, "Unknown": 99
    };

    // State untuk kontrol minggu (0 = minggu ini, -1 = minggu lalu, dsb)
    let currentWeekOffset = 0;

    function getWeekRange(offset = 0) {
        const now = new Date();
        now.setDate(now.getDate() + (offset * 7)); // Geser minggu berdasarkan offset

        const day = now.getDay();
        const diff = now.getDate() - day + (day === 0 ? -6 : 1); // Set ke Senin
        
        const monday = new Date(now.setDate(diff));
        monday.setHours(0,0,0,0);
        
        const sunday = new Date(monday);
        sunday.setDate(monday.getDate() + 6);
        sunday.setHours(23,59,59,999);
        
        return { monday, sunday };
    }

    function changeWeek(direction) {
        currentWeekOffset += direction;
        loadData();
    }

    async function loadData() {
        const { monday, sunday } = getWeekRange(currentWeekOffset);
        
        // Format tanggal Indonesia
        const options = { day: 'numeric', month: 'short' };
        document.getElementById('label-minggu').innerText = `Periode: ${monday.toLocaleDateString('id-ID', options)} - ${sunday.toLocaleDateString('id-ID', options)}`;

        // 1. Ambil data
        const { data: logs } = await _supabase.from('absensi_sapd')
            .select('*')
            .gte('created_at', monday.toISOString())
            .lte('created_at', sunday.toISOString());
            
        const { data: masters } = await _supabase.from('users_master').select('*');

        // 2. Sort Pangkat
        masters.sort((a, b) => (RANK_PRIORITY[a.pangkat] || 99) - (RANK_PRIORITY[b.pangkat] || 99));

        // 3. Olah data
        const userWeeklyData = {};
        masters.forEach(m => {
            userWeeklyData[m.discord_id] = {
                info: m,
                days: { 1: null, 2: null, 3: null, 4: null, 5: null, 6: null, 0: null }
            };
        });

        logs.forEach(log => {
            const dayNum = new Date(log.created_at).getDay();
            if (userWeeklyData[log.discord_id]) {
                userWeeklyData[log.discord_id].days[dayNum] = log.bukti_foto;
            }
        });

        // 4. Render Weekly
        document.getElementById('tbody-weekly').innerHTML = Object.values(userWeeklyData).map(u => {
            const renderDay = (idx) => u.days[idx] 
                ? `<a href="${u.days[idx]}" target="_blank" class="check-icon">✔</a>` 
                : `<span class="cross-icon">✘</span>`;

            return `
                <tr>
                    <td style="text-align:left;"><b>${u.info.nama_anggota}</b></td>
                    <td>${u.info.pangkat}</td>
                    <td>${u.info.divisi}</td>
                    <td>${renderDay(1)}</td><td>${renderDay(2)}</td><td>${renderDay(3)}</td>
                    <td>${renderDay(4)}</td><td>${renderDay(5)}</td><td>${renderDay(6)}</td><td>${renderDay(0)}</td>
                    <td><button onclick="resetUser('${u.info.discord_id}')" style="background:none; border:none; cursor:pointer;">🗑</button></td>
                </tr>`;
        }).join('');

        // 5. Render Alpa (Hanya tampil jika sedang melihat minggu ini)
        if (currentWeekOffset === 0) {
            const hariIni = new Date().getDay();
            const bolos = Object.values(userWeeklyData).filter(u => !u.days[hariIni]);
            document.querySelector('#table-alpa tbody').innerHTML = bolos.map(u => `
                <tr><td>${u.info.nama_anggota}</td><td>${u.info.pangkat}</td><td>${u.info.divisi}</td><td><span class="badge-alpa">ALPA</span></td></tr>
            `).join('');
        } else {
            document.querySelector('#table-alpa tbody').innerHTML = `<tr><td colspan="4" style="opacity:0.5;">Monitoring Alpa hanya tersedia untuk minggu berjalan.</td></tr>`;
        }
    }

    async function resetUser(discordId) {
        if(confirm("Hapus seluruh log user ini untuk periode yang dipilih?")) {
            const { monday, sunday } = getWeekRange(currentWeekOffset);
            await _supabase.from('absensi_sapd').delete()
                .eq('discord_id', discordId)
                .gte('created_at', monday.toISOString())
                .lte('created_at', sunday.toISOString());
            loadData();
        }
    }

    function showTab(e, id) { 
        document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).style.display = 'block'; e.target.classList.add('active');
    }

    loadData();
</script>
</body>
</html>
