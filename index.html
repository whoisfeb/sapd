<div class="container">
    <h2>Sistem Absensi Khusus</h2>
    <p>Silakan login untuk memverifikasi role Anda.</p>
    
    <a href="https://discord.com/api/oauth2/authorize?client_id=ID_ANDA&redirect_uri=URL_REDIRECT&response_type=code&scope=identify" 
       style="background: #5865F2; color: white; padding: 10px 20px; text-decoration: none; border-radius: 5px;">
        Login with Discord
    </a>

    <div id="msg"></div>
</div>

<script>
    // Cek pesan error dari URL
    const params = new URLSearchParams(window.location.search);
    if (params.get('error') === 'no_role') {
        document.getElementById('msg').innerText = "Maaf, Anda tidak memiliki akses ke sistem ini.";
        document.getElementById('msg').style.color = "red";
    }
</script>
